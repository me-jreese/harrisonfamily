name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-west-2
      CF_DISTRIBUTION_ID: E2JCDK3QLQNNYB
      LAMBDA_NAME: hfy-check-allowed
      GCP_PROJECT_ID: harrisonfamily
      GCF_REGION: us-west2
      GCF_FUNCTION: getAllowlist
      GCF_ENV_VARS: HFY_ALLOWLIST_SECRET=harrisonfamily-allowlist,GCP_PROJECT=harrisonfamily
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Patch OAuth client ID in source files
        env:
          HFY_GOOGLE_CLIENT_ID: ${{ secrets.HFY_GOOGLE_CLIENT_ID }}
        run: |
          find 11ty -type f \( -name '*.html' -o -name '*.js' \) \
            -exec grep -l 'REPLACE_WITH_GOOGLE_CLIENT_ID' {} + \
          | xargs -r sed -i "s/REPLACE_WITH_GOOGLE_CLIENT_ID/${HFY_GOOGLE_CLIENT_ID}/g"

      - name: Sync static site to S3
        run: |
          aws s3 sync 11ty/ s3://harrisonfamily-frontend --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package Lambda
        working-directory: lambda/hfy-check-allowed
        run: |
          npm ci
          mkdir -p ../../dist
          zip -r ../../dist/hfy-check-allowed.zip index.mjs package.json package-lock.json node_modules

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code --function-name $LAMBDA_NAME --zip-file fileb://dist/hfy-check-allowed.zip

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud authentication
        run: |
          gcloud config set project $GCP_PROJECT_ID
          gcloud auth list

      - name: Deploy Google Cloud Function
        run: |
          gcloud functions deploy $GCF_FUNCTION \
            --region=$GCF_REGION \
            --gen2 \
            --runtime=python311 \
            --source=functions/get-allowlist \
            --entry-point=get_allowlist \
            --trigger-http \
            --no-allow-unauthenticated \
            --set-env-vars=$GCF_ENV_VARS
