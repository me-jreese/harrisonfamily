AWSTemplateFormatVersion: '2010-09-09'
Description: >
  HarrisonFamily GitHub OIDC Roles -- IAM role assumed by GitHub Actions
  via OIDC for deploying the harrisonfamily site.

  Deploy manually once with admin credentials:
    aws cloudformation deploy --stack-name harrisonfamily-github-roles \
      --template-file infrastructure/cloudformation/github-roles.yaml \
      --capabilities CAPABILITY_NAMED_IAM --region us-west-2

  Then set the AWS_DEPLOY_ROLE_TO_ASSUME repo secret to the
  DeployRoleArn output value.

Parameters:
  GitHubOrg:
    Type: String
    Default: me-jreese
    Description: GitHub user/organization name
  GitHubRepo:
    Type: String
    Default: harrisonfamily
    Description: GitHub repository name
  OIDCProviderArn:
    Type: String
    Default: arn:aws:iam::356364570033:oidc-provider/token.actions.githubusercontent.com
    Description: >
      ARN of the existing GitHub OIDC identity provider in this account.

Resources:
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: harrisonfamily-github-deploy-role
      Description: >
        GitHub Actions OIDC role for deploying the harrisonfamily site
        (S3 sync, CloudFront invalidation, Lambda update).
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      Policies:
        - PolicyName: HarrisonFamilyDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3SiteSync
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::harrisonfamily-frontend
                  - arn:aws:s3:::harrisonfamily-frontend/*

              - Sid: CloudFrontInvalidation
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/E2JCDK3QLQNNYB"

              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                Resource:
                  - !Sub "arn:aws:lambda:us-west-2:${AWS::AccountId}:function:hfy-check-allowed"

Outputs:
  DeployRoleArn:
    Description: >
      ARN to set as the AWS_DEPLOY_ROLE_TO_ASSUME repository secret.
    Value: !GetAtt GitHubDeployRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DeployRoleArn"
